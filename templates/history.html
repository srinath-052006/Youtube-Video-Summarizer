<!DOCTYPE html>
<html>
<head><title>History</title></head>
<body>
<h2>{{ user }}'s YouTube History</h2>
<a href="{{ url_for('dashboard') }}">Back to Dashboard</a>
<ul>
{% for url, summary, date in links %}
    <li>
        {{ date }} → <a href="{{ url }}" target="_blank">{{ url }}</a>
        {% if summary %}
        <p><strong>AI Summary:</strong> {{ summary }}</p>
        {% endif %}
    </li>
{% endfor %}
</ul>
</body>
</html>
